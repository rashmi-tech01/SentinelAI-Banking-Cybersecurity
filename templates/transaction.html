<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SentinelAI - Transaction Analysis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

<div class="container">

<a class="navbar-brand fw-bold fs-3">
🛡 SentinelAI
</a>

<div>

<a href="/dashboard" class="btn btn-outline-light">
🏠 Dashboard
</a>

</div>

</div>

</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-header bg-primary text-white text-center p-4">

<h2 class="mb-1">
🤖 AI Transaction Risk Analysis
</h2>

<p class="mb-0">
Banking Fraud Detection using Machine Learning
</p>

</div>

<div class="card-body p-4">

<form action="/predict" method="POST">

<div class="mb-4">

<label class="form-label fw-bold">
💰 Transaction Amount
</label>

<div class="input-group">

<span class="input-group-text">₹</span>

<input
type="number"
name="amount"
class="form-control"
placeholder="Enter transaction amount"
required>

</div>

</div>

<div class="mb-4">

<label class="form-label fw-bold">
📱 Device Status
</label>

<select name="device" class="form-select">

<option value="0">Known Device</option>

<option value="1">New Device</option>

</select>

</div>

<div class="mb-4">

<label class="form-label fw-bold">
🌐 VPN Usage
</label>

<select name="vpn" class="form-select">

<option value="0">No VPN</option>

<option value="1">VPN Detected</option>

</select>

</div>

<div class="mb-4">

<label class="form-label fw-bold">
🔒 Failed Login Attempts
</label>

<input
type="number"
name="login_attempts"
class="form-control"
placeholder="Enter failed login attempts"
required>

</div>

<div class="d-grid">

<button type="submit" class="btn btn-danger btn-lg">

🚀 Analyze Transaction

</button>

</div>

</form>

</div>

<div class="card-footer text-center bg-light">

<small class="text-muted">

Powered by <b>Random Forest Machine Learning Model</b>

</small>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
