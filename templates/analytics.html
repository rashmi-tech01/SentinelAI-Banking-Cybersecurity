<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelAI Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-5">
        📊 SentinelAI Analytics Dashboard
    </h1>

    <div class="row">

        <div class="col-md-6">
            <div class="card shadow p-3">
                <h4 class="text-center">Fraud vs Approved</h4>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-3">
                <h4 class="text-center">Risk Score Distribution</h4>
                <canvas id="barChart"></canvas>
            </div>
        </div>

    </div>

</div>

<script>

const blocked = Number("{{ blocked|default(0) }}");
const approved = Number("{{ approved|default(0) }}");
const avgRisk = Number("{{ avg_risk|default(0) }}");

new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: ["Blocked", "Approved"],
        datasets: [{
            data: [blocked, approved]
        }]
    }
});

new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
        labels: ["Average Risk"],
        datasets: [{
            label: "Risk Score",
            data: [avgRisk]
        }]
    }
});

</script>

</body>
</html>
